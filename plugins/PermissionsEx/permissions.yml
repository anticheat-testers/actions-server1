groups:
  default:
    options:
      default: 'true'
      prefix: '&7'
    permissions:
    - essentials.msg
    - gadgetsmenu.menuselector
    - gadgetsmenu.mysteryboxes.open.*
    - gadgetsmenu.animations.normal
  VIP:
    options:
      default: 'false'
      prefix: '&a[VIP] &7'
    permissions:
    - lostskywars.rank.vip
    inheritance:
    - default
  VIP+:
    options:
      default: 'false'
      prefix: '&a[VIP&6+&a] &7'
    permissions:
    - lostskywars.rank.vip+
    inheritance:
    - default
  MVP:
    options:
      default: 'false'
      prefix: '&b[MVP] &7'
    permissions:
    - lostskywars.rank.mvp
    inheritance:
    - default
  MVP+:
    options:
      default: 'false'
      prefix: '&b[MVP&c+&b] &7'
    permissions:
    - lostskywars.rank.mvp+
    inheritance:
    - default
  MVP++:
    inheritance:
    - Default
    - VIP
    - VIP+
    - MVP
    - MVP+
    permissions:
    - vipfeatures.spells.explosive
    - vipfeatures.spells.fire
    - vipfeatures.spells.web
    - vipfeatures.spells.zombie
    - vipfeatures.spells.poison
    - modifyworld.*
    - gadgetsmenu.cosmetics.*
    - chatexpressions.useall
    worlds:
      world:
        permissions:
        - essentials.fly
        - itemjoin.1
        - no.hunger
    options:
      prefix: '&6[MVP&c++&6] '
  ADMIN:
    inheritance:
    - Default
    - VIP
    - VIP+
    - MVP
    - MVP+
    - MVP++
    permissions:
    - chatexpressions.reload
    - chatexpressions.useall
    - fawe.admin
    - cc.clear
    - StaffChat.use
    - broadcast.2
    - simplekaboom.command.admin
    - gadgetsmenu.cosmetics.*
    - Mik1313.giftcode.add
    - Mik1313.giftcode.del
    - essentials.*
    - vanish.use
    - vanish.other
    - vanish.list
    - vanish.silentchest
    - litebans.ban
    - litebans.tempban
    - litebans.ipban
    - litebans.unban.own
    - litebans.unban
    - litebans.mute
    - litebans.tempmute
    - litebans.ipmute
    - litebans.unmute.own
    - litebans.warn
    - litebans.unwarn.own
    - litebans.unwarn
    - litebans.kick
    - litebans.kick.global
    - litebans.history
    - litebans.staffhistory
    - litebans.banlist
    - litebans.warnings
    - litebans.dupeip
    - litebans.ipreport
    - litebans.geoip
    - litebans.checkban
    - litebans.checkmute
    - litebans.lockdown
    - litebans.clearchat
    - litebans.mutechat
    - litebans.lastuuid
    - admin.color
    - multiverse.*
    - multiverse.access.*
    - worldedit.*
    - worldguard.*
    - skinsrestorer.cmds
    - skinsrestorer.admincommand
    - skinsrestorer.command
    options:
      prefix: '&c[ADMIN] '
  YOUTUBE:
    inheritance:
    - Default
    - VIP
    - VIP+
    - MVP
    - MVP+
    permissions:
    - autosmelt.mine
    - gadgetsmenu.cosmetics.*
    - deliveryman.reward.mvp+
    - deliveryman.reward.mvp+.coins
    - deliveryman.reward.mvp
    - deliveryman.reward.mvp.coins
    - deliveryman.reward.vip
    - deliveryman.reward.vip.coins
    - deliveryman.reward.vip+
    - deliveryman.reward.vip+.coins
    worlds:
      world:
        permissions:
        - essentials.fly
        - itemjoin.1
        - no.hunger
    options:
      prefix: '&6[YT] '
  Owner:
    inheritance:
    - Default
    - VIP
    - VIP+
    - MVP
    - MVP+
    - MVP++
    - YOUTUBE
    - ADMIN
    permissions:
    - essentials.*
    - minecraft.*
    - worldedit.*
    - worldguard.*
    - bukkit.*
    worlds:
      '&7':
        options:
          prefix: '&8[&4Owner&8]'
      '&4OWNER':
        options:
          prefix: '&8[&4Owner&8]'
      '&7world':
        options:
          prefix: '&8[&4Owner&8]'
      world:
        options:
          prefix: '&8[&4Owner&8]'
    options:
      prefix: '&7[&4Owner&7] &7'
